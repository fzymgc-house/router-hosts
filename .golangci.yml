version: "2"
run:
  timeout: 5m
linters:
  default: standard
  enable:
    - revive
    - gocritic
    - misspell
    - nilerr
    - errorlint
    - exhaustive
    - prealloc
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
    exhaustive:
      default-signifies-exhaustive: true
formatters:
  enable:
    - gofumpt
issues:
  exclude-use-default: false
