name: Release
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (e.g. v0.9.0)"
        required: true
        type: string
permissions:
  contents: write
  packages: write
jobs:
  goreleaser:
    runs-on: namespace-profile-linux-amd64-8x16
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

  # Publish the operator Helm chart as an OCI artifact. The chart's version and
  # appVersion are bumped in lockstep with the release tag by release-please, so
  # the packaged chart references the matching combined image tag.
  helm-chart:
    runs-on: namespace-profile-linux-amd64-2x4
    timeout-minutes: 15
    needs: goreleaser
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: azure/setup-helm@v4
      - name: Login to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: echo "$GHCR_TOKEN" | helm registry login ghcr.io -u "$GHCR_USER" --password-stdin
      - name: Package chart
        run: helm package charts/router-hosts-operator --destination dist-chart
      - name: Push chart
        run: helm push dist-chart/router-hosts-operator-*.tgz oci://ghcr.io/fzymgc-house/charts
