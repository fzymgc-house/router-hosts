name: CI (Go)
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  lint:
    name: Lint
    runs-on: namespace-profile-linux-amd64-2x4
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go
      - uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8
  vuln:
    name: Vulnerability check
    runs-on: namespace-profile-linux-amd64-4x8
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go
      - name: Vulnerability check
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...
  test:
    name: Test
    runs-on: namespace-profile-linux-amd64-4x8
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go
      - name: Install task runner
        run: go install github.com/go-task/task/v3/cmd/task@latest
      - name: Run tests with coverage
        run: task test:coverage:ci
      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: coverage
          path: coverage.out
  build:
    name: Build
    runs-on: namespace-profile-linux-amd64-2x4
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go
      - name: Build all packages
        run: go build ./...
  buf-check:
    name: Buf lint & format
    runs-on: namespace-profile-linux-amd64-2x4
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: bufbuild/buf-setup-action@v1
      - name: Lint protobuf
        run: buf lint
      - name: Check protobuf formatting
        run: buf format --diff --exit-code
  manifests:
    name: Manifests up to date
    runs-on: namespace-profile-linux-amd64-2x4
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go
      - name: Install task runner
        run: go install github.com/go-task/task/v3/cmd/task@latest
      - name: Verify CRDs and deepcopy match Go types
        run: task manifests:verify
  docs:
    name: Docs build (strict)
    runs-on: namespace-profile-linux-amd64-2x4
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - name: Cache Go modules and build
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1
        with:
          cache: go
      - name: Install task runner
        run: go install github.com/go-task/task/v3/cmd/task@latest
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"
      - name: Install protoc-gen-doc
        run: go install github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc@v1.5.1
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Build router-hosts binary (for CLI docs)
        run: go build -o /tmp/router-hosts ./cmd/router-hosts
      - name: Build docs (strict)
        run: task docs:ci BINARY=/tmp/router-hosts
  ci-go-complete:
    name: CI (Go) Complete
    if: always()
    needs: [lint, vuln, test, build, buf-check, manifests, docs]
    runs-on: namespace-profile-linux-amd64-2x4
    timeout-minutes: 5
    steps:
      - name: Check job results
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          VULN_RESULT: ${{ needs.vuln.result }}
          TEST_RESULT: ${{ needs.test.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          BUF_RESULT: ${{ needs.buf-check.result }}
          MANIFESTS_RESULT: ${{ needs.manifests.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
        run: |
          if [[ "$LINT_RESULT" != "success" ]] ||
             [[ "$VULN_RESULT" != "success" ]] ||
             [[ "$TEST_RESULT" != "success" ]] ||
             [[ "$BUILD_RESULT" != "success" ]] ||
             [[ "$BUF_RESULT" != "success" ]] ||
             [[ "$MANIFESTS_RESULT" != "success" ]] ||
             [[ "$DOCS_RESULT" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"
