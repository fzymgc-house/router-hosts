# Lefthook configuration
# https://github.com/evilmartians/lefthook
#
# Install: lefthook install
# Run manually: lefthook run pre-commit --all-files
#
# Hooks are ordered by speed (fast checks first) for fail-fast behavior.
# Expensive checks (clippy) run only on pre-push stage.
# Tests run in ci.yml workflow, not here (avoids CI duplication).
#
# Prerequisites:
# - lefthook: brew install lefthook
# - buf: brew install bufbuild/buf/buf
# - cocogitto: brew install cocogitto
# - rumdl: cargo install rumdl OR brew install rumdl
# - yamlfmt: go install github.com/google/yamlfmt/cmd/yamlfmt@latest OR brew install yamlfmt
pre-commit:
  parallel: true
  commands:
    check-merge-conflict:
      glob: "*.{rs,toml,yaml,yml,proto,sh,md}"
      run: |
        if grep -rql "^<<<<<<<\|^=======\|^>>>>>>>" {staged_files}; then
          echo "ERROR: Merge conflict markers found in staged files"
          exit 1
        fi
    cargo-fmt:
      glob: "*.rs"
      run: cargo fmt -- --check
    buf-format:
      glob: "*.proto"
      run: buf format --diff --exit-code
    buf-lint:
      glob: "*.proto"
      run: buf lint
    shellcheck:
      glob: "examples/*.sh"
      run: shellcheck {staged_files}
    lint-markdown:
      glob: "*.md"
      run: rumdl check {staged_files}
    fmt-markdown:
      glob: "*.md"
      run: rumdl fmt {staged_files}
      stage_fixed: true
    check-yaml:
      glob: "*.{yaml,yml}"
      exclude: "charts/.*templates/.*|mkdocs\\.yml"
      run: yamlfmt -lint {staged_files}
commit-msg:
  commands:
    conventional-commit:
      run: cog verify --file {1}
pre-push:
  commands:
    cargo-clippy:
      glob: "*.rs"
      run: cargo clippy --workspace -- -D warnings
