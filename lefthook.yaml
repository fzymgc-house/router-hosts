# Lefthook configuration
# https://github.com/evilmartians/lefthook
#
# Install: lefthook install
# Run manually: lefthook run pre-commit --all-files
#
# Hooks are ordered by speed (fast checks first) for fail-fast behavior.
# Expensive checks (golangci-lint) run only on pre-push stage.
# Tests run in ci-go.yml workflow, not here (avoids CI duplication).
#
# Prerequisites:
# - lefthook: brew install lefthook
# - buf: brew install bufbuild/buf/buf
# - cocogitto: brew install cocogitto
# - gofumpt: go install mvdan.cc/gofumpt@latest
# - golangci-lint: brew install golangci-lint
# - rumdl: brew install rumdl
# - yamlfmt: brew install yamlfmt
pre-commit:
  parallel: true
  commands:
    check-merge-conflict:
      glob: "*.{go,toml,yaml,yml,proto,sh,md}"
      run: |
        if grep -rql "^<<<<<<<\|^=======\|^>>>>>>>" {staged_files}; then
          echo "ERROR: Merge conflict markers found in staged files"
          exit 1
        fi
    gofumpt:
      glob: "*.go"
      run: gofumpt -l -d {staged_files}
    buf-format:
      glob: "*.proto"
      run: buf format --diff --exit-code
    buf-lint:
      glob: "*.proto"
      run: buf lint
    shellcheck:
      glob: "examples/*.sh"
      run: shellcheck {staged_files}
    lint-markdown:
      glob: "*.md"
      run: rumdl check {staged_files}
    fmt-markdown:
      glob: "*.md"
      run: rumdl fmt {staged_files}
      stage_fixed: true
    check-yaml:
      glob: "*.{yaml,yml}"
      exclude: "charts/.*templates/.*|mkdocs\\.yml"
      run: yamlfmt -lint {staged_files}
commit-msg:
  commands:
    conventional-commit:
      run: cog verify --file {1}
pre-push:
  commands:
    golangci-lint:
      glob: "*.go"
      run: golangci-lint run ./...
