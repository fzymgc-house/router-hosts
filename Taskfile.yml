version: '3'
vars:
  IMAGE_NAME: ghcr.io/fzymgc-house/router-hosts
  IMAGE_TAG: '{{.IMAGE_TAG | default "dev"}}'
  BINARY: '{{.BINARY | default "./bin/router-hosts"}}'
  MKDOCS: 'uvx --with mkdocs-material --with mkdocs-git-revision-date-localized-plugin --with mkdocs-exclude mkdocs'
tasks:
  build:
    desc: Build all binaries (debug)
    cmds:
      - go build -o bin/router-hosts ./cmd/router-hosts
      - go build -o bin/operator ./cmd/operator
  build:release:
    desc: Build all binaries with optimizations
    cmds:
      - go build -trimpath -ldflags="-s -w" -o bin/router-hosts ./cmd/router-hosts
      - go build -trimpath -ldflags="-s -w" -o bin/operator ./cmd/operator
  test:
    desc: Run all unit and integration tests
    cmds:
      - go test ./... -race -count=1
  test:e2e:
    desc: Run E2E tests with real mTLS (in-process)
    cmds:
      - go test -tags e2e -count=1 -v ./e2e/
  test:e2e:docker:
    desc: Run Docker E2E tests (builds image, requires Docker)
    deps: ['docker:build']
    cmds:
      - go test -tags docker_e2e -count=1 -v -timeout 5m ./e2e/
  test:coverage:
    desc: Run tests with HTML coverage report
    cmds:
      - go test ./internal/... -race -coverprofile=coverage.out -covermode=atomic
      - go tool cover -html=coverage.out -o coverage.html
      - go tool cover -func=coverage.out | tail -1
  test:coverage:ci:
    desc: Run tests with coverage (CI mode - enforces 80% threshold)
    cmds:
      - go test ./internal/... -race -coverprofile=coverage.out -covermode=atomic
      - |
        # Exclude test helper packages (storagetest) from coverage calculation
        grep -v '/storagetest/' coverage.out > coverage_ci.out || true
        COVERAGE=$(go tool cover -func=coverage_ci.out | tail -1 | awk '{print $3}' | tr -d '%')
        echo "Coverage: ${COVERAGE}%"
        if [ "$(echo "${COVERAGE} < 80" | bc)" -eq 1 ]; then
          echo "FAIL: Coverage ${COVERAGE}% is below 80% threshold"
          exit 1
        fi
  lint:
    desc: Run all linters (Go + protobuf)
    cmds:
      - golangci-lint run ./...
      - buf lint
      - buf format --diff --exit-code
  fmt:
    desc: Format all code (Go + protobuf)
    cmds:
      - gofumpt -w .
      - buf format -w
  proto:generate:
    desc: Generate Go code from protobuf definitions
    cmds:
      - buf generate
  docker:build:
    desc: Build Docker image for local architecture
    cmds:
      - docker build -t {{.IMAGE_NAME}}:{{.IMAGE_TAG}} .
  docs:build:
    desc: Build documentation site locally (with strict mode)
    deps: ['docs:generate']
    cmds:
      - '{{.MKDOCS}} build --strict'
  docs:serve:
    desc: Serve documentation locally with live reload
    deps: ['docs:generate']
    cmds:
      - '{{.MKDOCS}} serve'
  docs:generate:
    desc: Generate CLI and API reference docs from source
    deps: ['build:release']
    cmds:
      - ./scripts/generate-cli-docs.sh {{.BINARY}}
      - ./scripts/generate-proto-docs.sh
  docs:ci:
    desc: Build docs for CI (uses BINARY var, no build step)
    cmds:
      - ./scripts/generate-cli-docs.sh {{.BINARY}}
      - ./scripts/generate-proto-docs.sh
      - '{{.MKDOCS}} build --strict'
  clean:
    desc: Remove build artifacts and generated files
    cmds:
      - rm -rf bin/
      - rm -f coverage.out coverage.html
  ci:
    desc: Run full CI pipeline locally (lint + test)
    cmds:
      - task: lint
      - task: test
