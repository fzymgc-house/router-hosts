{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "router-hosts-operator.fullname" . }}
  labels:
    {{- include "router-hosts-operator.labels" . | nindent 4 }}
rules:
  # Traefik IngressRoute resources (traefik.io/v1alpha1).
  # The IngressRoute controller watches these and writes finalizers plus the
  # host-id annotation back, so it needs update/patch in addition to read.
  - apiGroups: ["traefik.io"]
    resources: ["ingressroutes", "ingressroutetcps"]
    verbs: ["get", "list", "watch", "update", "patch"]

  # HostMapping resources (router-hosts.fzymgc.house/v1alpha1).
  # The controller adds/removes a cleanup finalizer (update/patch) and writes
  # reconcile state to the status subresource. Verbs mirror the controller's
  # kubebuilder marker (internal/operator/hostmapping_controller.go).
  - apiGroups: ["router-hosts.fzymgc.house"]
    resources: ["hostmappings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["router-hosts.fzymgc.house"]
    resources: ["hostmappings/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["router-hosts.fzymgc.house"]
    resources: ["hostmappings/finalizers"]
    verbs: ["update"]
{{- end }}
