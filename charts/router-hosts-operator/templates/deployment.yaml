{{- $leaderElectionEnabled := .Values.leaderElection.enabled -}}
{{- if and (not (hasKey .Values.leaderElection "enabled")) (ge (int .Values.replicaCount) 2) -}}
  {{- $leaderElectionEnabled = true -}}
{{- end -}}
{{- if and $leaderElectionEnabled (not .Values.rbac.create) -}}
  {{- fail "Leader election requires RBAC. Set rbac.create=true or disable leader election." -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "router-hosts-operator.fullname" . }}
  labels:
    {{- include "router-hosts-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "router-hosts-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "router-hosts-operator.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "router-hosts-operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: operator
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "router-hosts-operator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The combined image entrypoint is the data-plane server; run the
          # operator binary instead.
          command: ["operator"]
          args:
            - --server-address={{ .Values.routerHosts.serverAddress }}
            - --tls-ca={{ .Values.routerHosts.tlsSecret.mountPath }}/ca.crt
            - --tls-cert={{ .Values.routerHosts.tlsSecret.mountPath }}/tls.crt
            - --tls-key={{ .Values.routerHosts.tlsSecret.mountPath }}/tls.key
            {{- with .Values.routerHosts.defaultIngressIP }}
            - --default-ingress-ip={{ . }}
            {{- end }}
            - --health-probe-bind-address=:{{ .Values.healthCheck.port }}
            - --metrics-bind-address={{ .Values.metrics.bindAddress }}
            {{- if $leaderElectionEnabled }}
            - --leader-elect
            {{- end }}
          ports:
            - name: health
              containerPort: {{ .Values.healthCheck.port }}
              protocol: TCP
          # Liveness probe - checks if the operator process is alive and responding
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: {{ .Values.healthCheck.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.livenessProbe.failureThreshold }}
          # Readiness probe - checks if startup is complete
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: {{ .Values.healthCheck.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.readinessProbe.failureThreshold }}
          # Startup probe - allows a longer window before liveness/readiness apply
          startupProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: {{ .Values.healthCheck.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.startupProbe.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tls
              mountPath: {{ .Values.routerHosts.tlsSecret.mountPath }}
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tls
          secret:
            secretName: {{ .Values.routerHosts.tlsSecret.name }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
