# Default values for router-hosts-operator

# Image configuration.
# The operator binary ships inside the combined router-hosts image
# (alongside the data-plane binary); the chart overrides the image
# entrypoint to run the operator.
image:
  repository: ghcr.io/fzymgc-house/router-hosts
  # Tag to pull; defaults to the chart appVersion (kept in lockstep with each
  # release by release-please), so leaving it empty tracks every release.
  tag: ""
  # Optional immutable digest pin (e.g. "sha256:abc123..."). When set, the
  # image is referenced as repository@digest and takes precedence over tag.
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Number of operator replicas.
# When using multiple replicas, leader election is automatically enabled.
replicaCount: 1

# Leader election (--leader-elect) for running multiple replicas safely.
# Only one replica reconciles at a time; others stand by. Auto-enabled when
# replicaCount >= 2. To force a value, set: leaderElection: { enabled: true }.
# The lease ID is router-hosts-operator.fzymgc.house (managed by
# controller-runtime; lease timings are not configurable via this chart).
leaderElection: {}

# ServiceAccount configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# RBAC configuration
rbac:
  # Specifies whether RBAC resources should be created
  create: true

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Resource limits and requests
resources: {}
  # limits:
  #   cpu: 200m
  #   memory: 256Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Metrics endpoint (--metrics-bind-address). Set to "0" to disable.
metrics:
  bindAddress: ":8080"

# Health/readiness probe HTTP server (--health-probe-bind-address)
healthCheck:
  # Port for the health check HTTP server
  port: 8081
  # Liveness probe configuration
  livenessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  # Readiness probe configuration
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  # Startup probe configuration (allows longer initial startup)
  startupProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 30

# Router-hosts server connection settings
routerHosts:
  # gRPC server address (--server-address), host:port
  serverAddress: router.lan:50051

  # Default IP assigned to hosts extracted from IngressRoutes
  # (--default-ingress-ip). Required for the IngressRoute controller to create
  # usable entries; leave empty only if you exclusively use HostMappings.
  defaultIngressIP: ""

  # mTLS client identity for the gRPC connection.
  # The Secret MUST live in the operator's own namespace — it is mounted as a
  # volume, not read cross-namespace — and contain keys: ca.crt, tls.crt, tls.key.
  tlsSecret:
    name: router-hosts-mtls
    mountPath: /etc/router-hosts/tls
